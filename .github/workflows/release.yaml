name: Release
on:
  push:
    tags:
      - v*
env:
  CRATE_NAME: pesde
  BIN_NAME: pesde
jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.bin }}
      found: ${{ steps.publish_status.outputs.value }}
      registry_version: ${{ steps.extract_version.outputs.registry }}
      registry_publish_status: ${{ steps.registry_publish_status.outputs.value }}
      registry_image: "ghcr.io/${{ steps.repository_owner.outputs.lowercase }}/registry"
    steps:
      - uses: actions/checkout@v6

      - name: Extract version
        id: extract_version
        run: |
          BIN_VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "${{ env.CRATE_NAME }}") | .version')
          REGISTRY_VERSION=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "${{ env.CRATE_NAME }}-registry") | .version')
          echo "bin=$BIN_VERSION" >> $GITHUB_OUTPUT
          echo "registry=$REGISTRY_VERSION" >> $GITHUB_OUTPUT

      - name: Check publish status
        id: publish_status
        shell: bash
        run: |
          set -euo pipefail
          FOUND=$(curl -sSL --fail-with-body "https://crates.io/api/v1/crates/${{ env.CRATE_NAME }}" | jq -r '.versions | any(.num == "${{ steps.extract_version.outputs.bin }}")')
          echo "value=$FOUND" >> "$GITHUB_OUTPUT"

      - name: Lowercase repository owner
        uses: ASzc/change-string-case-action@v8
        id: repository_owner
        with:
          string: ${{ github.repository_owner }}

      - name: Get Docker image publish status
        uses: tyriis/docker-image-tag-exists@v2.1.0
        id: registry_publish_status
        continue-on-error: true
        with:
          registry: ghcr.io
          repository: "${{ steps.repository_owner.outputs.lowercase }}/registry"
          tag: ${{ steps.extract_version.outputs.registry }}

  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            host: linux
            arch: x86_64
            target: x86_64-unknown-linux-gnu

          - runner: ubuntu-24.04-arm
            host: linux
            arch: aarch64
            target: aarch64-unknown-linux-gnu

          - runner: windows-latest
            host: windows
            arch: x86_64
            target: x86_64-pc-windows-msvc

          - runner: macos-15-intel
            host: macos
            arch: x86_64
            target: x86_64-apple-darwin

          - runner: macos-latest
            host: macos
            arch: aarch64
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    name: Build for ${{ matrix.host }}-${{ matrix.arch }}
    needs: [prepare]
    if: ${{ needs.prepare.outputs.found == 'false' }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Set env
        shell: bash
        run: |
          ARCHIVE_NAME=${{ env.BIN_NAME }}-${{ needs.prepare.outputs.version }}-${{ matrix.host }}-${{ matrix.arch }}

          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Install OS dependencies
        if: ${{ matrix.host == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install libdbus-1-dev pkg-config

      - name: Build
        run: cargo build --bins --all-features --release --target ${{ matrix.target }} --locked

      - name: Archive
        shell: bash
        run: |
          if [ "${{ matrix.host }}" = "windows" ]; then
            mv target/${{ matrix.target }}/release/${{ env.BIN_NAME }}.exe ${{ env.BIN_NAME }}.exe
            7z a ${{ env.ARCHIVE_NAME }}.zip ${{ env.BIN_NAME }}.exe
          else
            mv target/${{ matrix.target }}/release/${{ env.BIN_NAME }} ${{ env.BIN_NAME }}
            zip -r ${{ env.ARCHIVE_NAME }}.zip ${{ env.BIN_NAME }}
          fi

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARCHIVE_NAME }}.zip
          path: ${{ env.ARCHIVE_NAME }}.zip

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }} --allow-dirty --locked

  create_release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [prepare, publish]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
          pattern: "*.zip"

      - name: Check if CLI version is pre-release
        id: is_prerelease
        shell: bash
        run: |
          if [[ "${{ needs.prepare.outputs.version }}" == *"-"* ]]; then
            echo "value=true" >> $GITHUB_OUTPUT
          else
            echo "value=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.prepare.outputs.version }}
          draft: true
          prerelease: ${{ steps.is_prerelease.outputs.value }}
          files: artifacts/*

  build-registry-image:
    name: Build Docker image
    needs: [prepare]
    if: ${{ needs.prepare.outputs.registry_publish_status == 'not found' }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64

          - os: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Log into the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-registry-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [prepare, build-registry-image]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log into the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          if [[ "${{ needs.prepare.outputs.registry_version }}" == *"-"* ]]; then
            TAG="pre"
          else
            TAG="latest"
          fi
          docker buildx imagetools create \
            -t ${{ needs.prepare.outputs.registry_image }}:sha-${GITHUB_SHA} \
            -t ${{ needs.prepare.outputs.registry_image }}:${{ needs.prepare.outputs.registry_version }} \
            -t ${{ needs.prepare.outputs.registry_image }}:${TAG} \
            $(printf '${{ needs.prepare.outputs.registry_image }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ needs.prepare.outputs.registry_image }}:${{ needs.prepare.outputs.registry_version }}
